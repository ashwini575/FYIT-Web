<!DOCTYPE html>
<html>
<head>
    <title>Add Two Numbers</title>
</head>
<body>

    <h2>Simple Addition</h2>
    
    <!-- Input fields for the user to type numbers -->
    <input type="number" id="num1" placeholder="Enter first number">
    <span> + </span>
    <input type="number" id="num2" placeholder="Enter second number">
    
    <!-- Button to trigger the addition -->
    <button onclick="calculateSum()">=</button>

    <!-- Element where the result will be displayed -->
    <h3 id="result">Result: </h3>

    <script>
        function calculateSum() {
            // Retrieve values from the input boxes
            let value1 = document.getElementById("num1").value;
            let value2 = document.getElementById("num2").value;

            // Convert text inputs into floating-point numbers and add them
            let sum = parseFloat(value1) + parseFloat(value2);

            // Display the output on the page
            if (!isNaN(sum)) {
                document.getElementById("result").innerHTML = "Result: " + sum;
            } else {
                document.getElementById("result").innerHTML = "Please enter valid numbers.";
            }
        }
    </script>

</body>
</html>
